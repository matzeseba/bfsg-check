<!doctype html><html lang="de"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Vertrag widerrufen</title>
<style>body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:560px;margin:0 auto;padding:40px 20px;color:#0f172a;line-height:1.6}label{display:block;margin:10px 0 4px;font-size:14px}input{width:100%;padding:10px;border:2px solid #e2e8f0;border-radius:8px}.btn{background:#1d4ed8;color:#fff;border:none;border-radius:8px;padding:12px 20px;font-weight:700;cursor:pointer;margin-top:16px;width:100%}a{color:#1d4ed8}.ok{background:#ecfdf5;border:1px solid #a7f3d0;border-radius:8px;padding:14px;margin-top:14px}</style>
</head><body>
<h1>Vertrag widerrufen</h1>
<p>Verbraucher können hier ihren Vertrag widerrufen (§ 356e BGB). Nach dem Absenden bestätigen Sie den Widerruf auf der nächsten Stufe.</p>
<div id="step1">
  <label>Name<input id="w-name"></label>
  <label>E-Mail (wie bei der Bestellung)<input id="w-email" type="email"></label>
  <label>Vertrag/Bestellung (Datum, ggf. Nummer)<input id="w-vertrag"></label>
  <button class="btn" type="button" onclick="document.getElementById('step1').style.display='none';document.getElementById('step2').style.display='block'">Weiter</button>
</div>
<div id="step2" style="display:none">
  <p>Bitte bestätigen Sie Ihren Widerruf verbindlich.</p>
  <button class="btn" type="button" onclick="sendWiderruf()">Widerruf bestätigen</button>
</div>
<div id="done" class="ok" style="display:none">Ihr Widerruf ist eingegangen. Sie erhalten eine Bestätigung per E-Mail.</div>
<p style="margin-top:20px"><a href="/">&larr; Zurück</a></p>
<script>
async function sendWiderruf(){
  var b={name:w_name.value,email:w_email.value,vertrag:w_vertrag.value,datum:new Date().toISOString()};
  try{var r=await fetch('/api/widerruf',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)});
    if(r.ok){document.getElementById('step2').style.display='none';document.getElementById('done').style.display='block';}
    else{alert('Bitte Name und E-Mail angeben.');}}catch(_){alert('Verbindung fehlgeschlagen.');}
}
</script>
</body></html>
