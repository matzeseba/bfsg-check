version: '3.8'

services:
  app:
    build:
      context: ../scanner
      dockerfile: Dockerfile
    container_name: bfsg-app
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - PUBLIC_URL=${PUBLIC_URL}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - FROM_EMAIL=${FROM_EMAIL}
      - FROM_NAME=${FROM_NAME}
      - REPLY_TO=${REPLY_TO}
      - INVOICE_CONTACT_EMAIL=${INVOICE_CONTACT_EMAIL:-info@bfsg-fix.de}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      # --- Brevo REST-API (Newsletter + Scan-Lead-Capture via Double-Opt-in). Ohne
      #     explizite Auflistung erreichen die .env-Werte den Container NICHT (kein
      #     env_file → nur gelistete Vars werden durchgereicht). Leer = Endpunkte
      #     melden ehrlich "gerade nicht verfügbar". ---
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - BREVO_NEWSLETTER_LIST_ID=${BREVO_NEWSLETTER_LIST_ID:-}
      - BREVO_DOI_TEMPLATE_ID=${BREVO_DOI_TEMPLATE_ID:-}
      - BREVO_DOI_REDIRECT_URL=${BREVO_DOI_REDIRECT_URL:-}
      - BREVO_LEAD_LIST_ID=${BREVO_LEAD_LIST_ID:-}
      - BREVO_LEAD_DOI_TEMPLATE_ID=${BREVO_LEAD_DOI_TEMPLATE_ID:-}
      - BREVO_LEAD_DOI_REDIRECT_URL=${BREVO_LEAD_DOI_REDIRECT_URL:-}
      - ENABLE_ABO=${ENABLE_ABO:-false}
      - MAX_CONCURRENT_SCANS=${MAX_CONCURRENT_SCANS:-2}
      # Gratis-Teaser-TLS-Toleranz (env-gated, Default aus). Wird in app.js gelesen
      # und nur an den kostenlosen Teaser-Scan durchgereicht.
      - SCAN_TEASER_LENIENT_TLS=${SCAN_TEASER_LENIENT_TLS:-false}
      # Bezahlter Scan-Pfad: TLS-Toleranz NUR über dieses SEPARATE Flag (Default leer/false
      # = strikt). Bewusst getrennt vom Teaser-Flag — ein verkaufter Report darf nicht still
      # mit gelockerter Zertifikatsprüfung erzeugt werden (s. scanner/lib/fulfill.js).
      # Nur setzen, wenn der Owner Lenient-TLS im Bezahlpfad bewusst will. SSRF-Schutz unberührt.
      - SCAN_PAID_LENIENT_TLS=${SCAN_PAID_LENIENT_TLS:-}
      # PR4: KI-Report-QA-Agent. Default AUS (dormant) — ohne REPORT_QA_ENABLED=true
      # + ANTHROPIC_API_KEY passiert nichts am verkauften Report (strikt fail-open).
      # Modell konfigurierbar (Default claude-sonnet-4-6; claude-opus-4-8 optional).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - REPORT_QA_ENABLED=${REPORT_QA_ENABLED:-false}
      - REPORT_QA_MODEL=${REPORT_QA_MODEL:-claude-sonnet-4-6}
      - REPORT_QA_TIMEOUT_MS=${REPORT_QA_TIMEOUT_MS:-90000}
      - REPORT_QA_MAX_TOKENS=${REPORT_QA_MAX_TOKENS:-8000}
      # PR5: Owner-Release-Gate. Default AN — jeder Report geht vor Auslieferung zur
      # Freigabe an den Owner (1-Klick-Mail) + Auto-Release nach RELEASE_DELAY_MIN.
      # RELEASE_TOKEN_SECRET optional (Fallback ADMIN_TOKEN). pending-reports.jsonl liegt
      # im bfsg_data-Volume (Default-Pfad /app/out) → überlebt Redeploys.
      - REPORT_RELEASE_GATE_ENABLED=${REPORT_RELEASE_GATE_ENABLED:-true}
      - RELEASE_DELAY_MIN=${RELEASE_DELAY_MIN:-90}
      - SCHEDULER_INTERVAL_MS=${SCHEDULER_INTERVAL_MS:-60000}
      - RELEASE_TOKEN_SECRET=${RELEASE_TOKEN_SECRET:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - VAT_MODE=${VAT_MODE:-kleinunternehmer}
      - INVOICE_FROM_NAME=${INVOICE_FROM_NAME:-}
      - INVOICE_FROM_ADDRESS=${INVOICE_FROM_ADDRESS:-}
      - INVOICE_USTID=${INVOICE_USTID:-}
      - INVOICE_TAX_NUMBER=${INVOICE_TAX_NUMBER:-}
      - INVOICE_IBAN=${INVOICE_IBAN:-}
    volumes:
      - bfsg_data:/app/out
      # Statische Landing-Page (Fallback für /danke.html + Backward-Compat).
      - ../landingpage:/landingpage:ro
    shm_size: 1gb
    # OOM-Backstop: begrenzt den App-Container (einziger Chromium-Spawner) auf
    # APP_MEM_LIMIT (Default 3g, env-übersteuerbar im Server-.env). Ein Speicher-
    # Runaway killt+restartet dann NUR diesen Container (restart: unless-stopped),
    # statt den Host-OOM-Killer beliebige Container (z.B. Caddy) reissen zu lassen.
    # 4-GB-Host: 3g lässt ~1 GB für landing-next/admin-next/caddy/OS.
    mem_limit: ${APP_MEM_LIMIT:-3g}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Next.js-Landingpage (löst alte statische HTML ab, Caddy routet bfsg-fix.de hierhin).
  landing-next:
    build:
      context: ../landingpage-next
      dockerfile: Dockerfile
    container_name: bfsg-landing-next
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - app

  # Admin-Dashboard (admin.bfsg-fix.de, Auth-Layer in Welle 5).
  admin-next:
    build:
      context: ../admin-next
      dockerfile: Dockerfile
    container_name: bfsg-admin-next
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - BFSG_API_URL=http://app:8080
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - app

  caddy:
    image: caddy:2-alpine
    container_name: bfsg-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - landing-next
      - admin-next

volumes:
  bfsg_data:    # /app/out — orders.jsonl + subscriptions.jsonl + invoices/ + dsgvo-tokens.jsonl
  caddy_data:   # Let's-Encrypt-Zertifikate
  caddy_config:
