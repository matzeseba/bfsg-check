#cloud-config
# BFSG-Check Server-Bootstrap (Hetzner Cloud, Ubuntu 24.04).
# Vollautomatisch beim ersten Boot — kein SSH nötig.
# Schreibt nur SERVER-spezifische Files (.env, override) — der Code
# kommt aus git und wird per GitHub-Actions-Deploy aktualisiert.

hostname: bfsg-fix

users:
  - name: root
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINWLfkNJJv0x1V/bKfIvJv3fg+J5OwSCDcT/tRTF5fdx operator-deploy-key

write_files:
  - path: /opt/bfsg-bootstrap.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      set -x
      exec > /var/log/bfsg-bootstrap.log 2>&1

      # --- Packages (inkl. Backup-Tools: gnupg + rclone) ---
      apt-get update -q
      apt-get install -y -q curl ca-certificates git ufw gnupg rclone

      # --- Docker (offizieller Installer, bringt Docker Engine + Compose-Plugin) ---
      curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
      sh /tmp/get-docker.sh

      # --- Firewall ---
      ufw allow OpenSSH || true
      ufw allow 80/tcp
      ufw allow 443/tcp
      ufw --force enable

      # --- Repo clonen ---
      git clone https://github.com/matzeseba/bfsg-check.git /opt/bfsg-check
      cd /opt/bfsg-check

      # --- .env (server-spezifisch, NICHT im Repo) ---
      # ACHTUNG: PLACEHOLDER ersetzen vor Server-Create im Hetzner-API-Call!
      cat > /opt/bfsg-check/deployment/.env <<'ENV'
      PUBLIC_URL=https://bfsg-fix.de
      PORT=8080
      ENABLE_ABO=false
      MAX_CONCURRENT_SCANS=2
      SMTP_HOST=smtp-relay.brevo.com
      SMTP_PORT=587
      # SMTP_USER / REPLY_TO / ADMIN_EMAIL: vor Server-Create durch die echte
      # Betreiber-/SMTP-E-Mail ersetzen (PII, gehoert NICHT ins Repo).
      SMTP_USER=DEINE-SMTP-EMAIL@example.com
      SMTP_PASS=PLACEHOLDER_BREVO_KEY
      FROM_EMAIL=no-reply@bfsg-fix.de
      FROM_NAME=BFSG-Check
      REPLY_TO=DEINE-SMTP-EMAIL@example.com
      ADMIN_EMAIL=DEINE-SMTP-EMAIL@example.com
      ENV

      # --- Phase-1-Override: Caddyfile.phase1 statt Caddyfile, nur Port 80 ---
      # Sobald DNS auf Server zeigt: dieses File löschen + `docker compose up -d`
      # → Phase 2 mit Let's-Encrypt-SSL und 301-Redirects der Alias-Domains.
      cat > /opt/bfsg-check/deployment/docker-compose.override.yml <<'OVR'
      services:
        caddy:
          ports: !override
            - "80:80"
          volumes: !override
            - ./Caddyfile.phase1:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
      OVR

      # --- Up ---
      cd /opt/bfsg-check/deployment
      docker compose up -d --build

      sleep 15
      docker compose ps

      # --- Backup-Cron (täglich 03:00 UTC) ---
      # Erwartet: Eigentümer fügt BACKUP_GPG_RECIPIENT + BACKUP_TARGET in .env hinzu,
      # sowie GPG-Pubkey-Import + rclone.conf in /root/.config/rclone/.
      # Ohne diese Configs läuft Backup nur lokal in /var/backups/bfsg/ (Retention 14 Tage).
      cat > /etc/cron.d/bfsg-backup <<'CRON'
      0 3 * * * root /opt/bfsg-check/deployment/backup.sh >> /var/log/bfsg-backup.log 2>&1
      CRON
      chmod 644 /etc/cron.d/bfsg-backup
      mkdir -p /var/backups/bfsg /root/.config/rclone
      echo "[bootstrap] Backup-Cron eingerichtet — siehe docs/BACKUP.md für BACKUP_GPG_RECIPIENT + rclone-Setup"

runcmd:
  - bash /opt/bfsg-bootstrap.sh
