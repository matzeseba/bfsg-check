name: Deploy to Hetzner

# Auto-Deploy bei jedem Push auf main: SSH zum Hetzner-Server,
# git pull, docker compose up. Kein Image-Rebuild nötig wenn nur
# landingpage/ oder Config geändert wurde (Volume-Mounts).
# Image-Rebuild erfolgt, wenn scanner/ geändert wurde.

on:
  push:
    branches: [main]
    paths:
      - 'scanner/**'
      - 'landingpage/**'        # alte statische HTML (Volume-Mount-Fallback für /danke.html)
      - 'landingpage-next/**'   # Next.js Premium-Landing
      - 'admin-next/**'         # Admin-Dashboard
      - 'deployment/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          # Brevo REST-API-Key kommt aus den GitHub-Repo-Secrets (maskiert), NICHT aus
          # dem Repo/Chat. Wird unten in die Server-.env upgesertet. Leer = kein Eintrag.
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          # Anthropic-API-Key für den KI-Report-QA-Agenten (PR4). Gleiches Muster wie BREVO:
          # aus GitHub-Secret (maskiert) in die Server-.env upserten. Leer = kein Eintrag.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Stripe-Secret-Key (rotiert 23.07.2026). Gleiches Muster: aus GitHub-Secret
          # (maskiert) in die Server-.env upserten. Leer = kein Eintrag.
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          # An den Remote-Skript-Kontext durchreichen (sonst sieht das Skript die Var nicht).
          envs: BREVO_API_KEY,ANTHROPIC_API_KEY,STRIPE_SECRET_KEY
          script_stop: true
          request_pty: true
          # Hotfix: cloud-init setzt initial chage -d 0 root → bei jedem SSH-Login fragt
          # PAM nach Password-Change. Bei non-TTY (was ssh-action war) bricht das ab.
          # request_pty löst das Sofort-Symptom, chage löst es dauerhaft (idempotent).
          script: |
            set -e
            # Idempotenter Password-Expiry-Reset (cloud-init/Image-Default setzt sonst chage -d 0).
            chage -d $(date +%Y-%m-%d) root || true
            chage -M 99999 root || true
            cd /opt/bfsg-check
            echo "=== git pull ==="
            git fetch origin main
            git reset --hard origin/main

            cd /opt/bfsg-check/deployment

            # BREVO_API_KEY aus GitHub-Secret in die .env upserten (nur falls Secret gesetzt).
            # Das Eintragen erfolgt durch den CI-Runner, nicht im Chat; GitHub maskiert den
            # Wert in den Logs. Andere BREVO_*-Vars (IDs, nicht geheim) liegen schon in .env.
            # set +e: dieser Schritt darf den Deploy NIE abbrechen (kein grep-in-if -> kein
            # script_stop-Abbruch bei Exit 1). Whitespace im Secret wird entfernt.
            set +e
            if [ -n "${BREVO_API_KEY:-}" ]; then
              KEY_CLEAN=$(printf '%s' "$BREVO_API_KEY" | tr -d '[:space:]')
              grep -v '^BREVO_API_KEY=' .env > .env.brevo.tmp
              printf 'BREVO_API_KEY=%s\n' "$KEY_CLEAN" >> .env.brevo.tmp
              mv .env.brevo.tmp .env
              echo "BREVO_API_KEY in .env gesetzt (Laenge ${#KEY_CLEAN})."
            else
              echo "Kein BREVO_API_KEY-Secret gesetzt — .env unveraendert."
            fi
            # ANTHROPIC_API_KEY analog upserten (PR4 KI-Report-QA). REPORT_QA_ENABLED steuert
            # separat im .env, ob die QA tatsaechlich laeuft (fail-open ohne Key = No-op).
            if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
              AKEY_CLEAN=$(printf '%s' "$ANTHROPIC_API_KEY" | tr -d '[:space:]')
              grep -v '^ANTHROPIC_API_KEY=' .env > .env.anthropic.tmp
              printf 'ANTHROPIC_API_KEY=%s\n' "$AKEY_CLEAN" >> .env.anthropic.tmp
              mv .env.anthropic.tmp .env
              echo "ANTHROPIC_API_KEY in .env gesetzt (Laenge ${#AKEY_CLEAN})."
            else
              echo "Kein ANTHROPIC_API_KEY-Secret gesetzt — .env unveraendert."
            fi
            # STRIPE_SECRET_KEY analog upserten (Key-Rotation 23.07.2026): neuer Key liegt
            # als GitHub-Secret, wird maskiert durch den Runner in die Server-.env geschrieben
            # und nie im Klartext geloggt. Leer = .env unveraendert.
            if [ -n "${STRIPE_SECRET_KEY:-}" ]; then
              SKEY_CLEAN=$(printf '%s' "$STRIPE_SECRET_KEY" | tr -d '[:space:]')
              grep -v '^STRIPE_SECRET_KEY=' .env > .env.stripe.tmp
              printf 'STRIPE_SECRET_KEY=%s\n' "$SKEY_CLEAN" >> .env.stripe.tmp
              mv .env.stripe.tmp .env
              echo "STRIPE_SECRET_KEY in .env gesetzt (Praefix $(printf '%s' "$SKEY_CLEAN" | cut -c1-7)..., Laenge ${#SKEY_CLEAN})."
            else
              echo "Kein STRIPE_SECRET_KEY-Secret gesetzt — .env unveraendert."
            fi
            set -e

            # Immer bauen (Docker-Layer-Cache macht unveränderte Images schnell).
            echo "=== docker compose up -d --build ==="
            docker compose up -d --build

            # Override aus Phase-1-Ära entfernen falls vorhanden (würde Caddy-Mount kapern).
            echo "=== Override-Check ==="
            ls -la docker-compose.override.yml 2>/dev/null && rm -f docker-compose.override.yml && echo "override entfernt" || echo "kein override"

            # Caddy IMMER force-recreate (Bind-Mount-Config wird sonst nicht übernommen).
            echo "=== Caddy force-recreate ==="
            docker compose up -d --force-recreate caddy

            echo "=== DIAGNOSE: Welches Caddyfile sieht der Container? ==="
            docker compose exec -T caddy sh -c 'sed -n "1,55p" /etc/caddy/Caddyfile' || echo "(exec failed)"
            echo "=== DIAGNOSE: Was liefert landing-next intern? ==="
            docker compose exec -T caddy sh -c 'wget -qO- --timeout=5 http://landing-next:3000/ | head -c 300' || echo "(landing-next unreachable from caddy)"
            echo ""
            echo "=== DIAGNOSE: Was liefert / via Caddy lokal? ==="
            curl -sS --max-time 5 -H "Host: bfsg-fix.de" http://localhost/ | head -c 300 || true
            echo ""

            echo "=== Health-Check ==="
            sleep 8
            curl -sS --max-time 5 http://localhost/health || (docker compose logs --tail=50 && exit 1)

            echo "=== Status ==="
            docker compose ps
