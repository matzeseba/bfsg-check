name: Deploy to Hetzner

# Auto-Deploy bei jedem Push auf main: SSH zum Hetzner-Server,
# git pull, docker compose up. Kein Image-Rebuild nötig wenn nur
# landingpage/ oder Config geändert wurde (Volume-Mounts).
# Image-Rebuild erfolgt, wenn scanner/ geändert wurde.

on:
  push:
    branches: [main]
    paths:
      - 'scanner/**'
      - 'landingpage/**'
      - 'deployment/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # Manueller Trigger via "Run workflow"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          script_stop: true
          request_pty: true
          # Hotfix: cloud-init setzt initial chage -d 0 root → bei jedem SSH-Login fragt
          # PAM nach Password-Change. Bei non-TTY (was ssh-action war) bricht das ab.
          # request_pty löst das Sofort-Symptom, chage löst es dauerhaft (idempotent).
          script: |
            set -e
            # Idempotenter Password-Expiry-Reset (cloud-init/Image-Default setzt sonst chage -d 0).
            chage -d $(date +%Y-%m-%d) root || true
            chage -M 99999 root || true
            cd /opt/bfsg-check
            echo "=== git pull ==="
            git fetch origin main
            git reset --hard origin/main

            cd /opt/bfsg-check/deployment

            # Immer bauen (Docker-Layer-Cache macht unveränderte Images schnell).
            echo "=== docker compose up -d --build ==="
            docker compose up -d --build

            # Caddy nutzt Bind-Mount-Config → kein Auto-Recreate bei Caddyfile-Änderung.
            # Graceful Reload, Fallback force-recreate.
            echo "=== Caddy-Reload ==="
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile \
              || docker compose up -d --force-recreate caddy

            echo "=== Health-Check ==="
            sleep 8
            curl -sS --max-time 5 http://localhost/health || (docker compose logs --tail=50 && exit 1)

            echo "=== Status ==="
            docker compose ps
