name: PR-CI

# PR-Gate vor Merge auf main (Merge = Live-Deploy!):
# 5 parallele Jobs — Scanner-Tests, Landingpage-Lint+Build, Legal-Grep,
# Preis-Sync (Scanner ↔ Landingpage), Caddy-Validate.
# Bewusst OHNE Secrets: läuft auch für Fork-PRs sicher.

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  scanner-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          # scanner/package-lock.json ist versioniert → reproduzierbarer Cache-Key.
          cache-dependency-path: scanner/package-lock.json
      - name: Dependencies installieren (ohne Chromium-Download)
        # npm ci gegen das versionierte Lockfile (bit-gleiche Dependency-Versionen
        # wie lokal). --ignore-scripts überspringt den postinstall-Chromium-Download —
        # die Tests (node --test) starten keinen Browser.
        run: npm ci --ignore-scripts
        working-directory: scanner
      - name: Tests ausführen
        run: npm test
        working-directory: scanner

  landingpage-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: landingpage-next/package-lock.json
      - name: Dependencies installieren
        run: npm ci
        working-directory: landingpage-next
      - name: Lint
        run: npm run lint
        working-directory: landingpage-next
      - name: Build
        run: npm run build
        working-directory: landingpage-next

  legal-grep:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verbotene Marketing-Claims prüfen
        run: node scripts/legal-grep.mjs

  # Preis-Sync: Paket-IDs, Cent-Beträge und available-Flags zwischen
  # scanner/app.js (PACKAGES) und landingpage-next/lib/config.ts müssen deckungsgleich
  # bleiben — sonst zeigt die Landingpage andere Preise als der Checkout berechnet.
  price-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Paket-/Preis-Konfiguration vergleichen
        run: node scripts/check-price-sync.mjs

  # Lehre aus dem P0-Ausfall 09.07. (PR #142/#143): eine syntaktisch ungültige
  # Caddyfile crash-loopte den gemeinsamen bfsg-caddy-Ingress → gesamte Live-Site
  # down. caddy validate fängt genau das VOR dem Merge (Merge = Auto-Deploy!).
  # Gleiches Image wie in deployment/docker-compose.yml (caddy:2-alpine).
  caddy-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Caddyfile-Syntax validieren
        run: >
          docker run --rm
          -v "$PWD/deployment/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2-alpine
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
