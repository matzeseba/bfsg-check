name: Bootstrap Operator SSH Key (one-time)

# Einmaliger, MANUELL ausloesbarer Helfer (kein Deploy, keine push-Trigger).
# Traegt ueber den bereits autorisierten CI-/Deploy-Key (HETZNER_SSH_KEY) den
# oeffentlichen SSH-Key des Owner-PCs in /root/.ssh/authorized_keys ein.
# DIAGNOSE-Variante: debug an, script_stop aus, Marker in Zeile 1, kein set -e.

on:
  workflow_dispatch:

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Install operator pubkey into authorized_keys
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          port: 22
          script_stop: false
          request_pty: true
          debug: true
          command_timeout: 2m
          script: |
            echo "MARK_START whoami=$(whoami) uid=$(id -u) tty=$(tty 2>/dev/null)"
            chage -l root 2>&1 | sed 's/^/CHAGE: /' || true
            chage -d $(date +%Y-%m-%d) root 2>&1 | sed 's/^/CHAGE_SET: /' || true
            chage -M 99999 root 2>&1 | sed 's/^/CHAGE_MAX: /' || true
            PUBKEY='ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHZi5Lu9MiiUU+WOzJmpY/RpLfhOzggkZJEh5wRsJAW4 matze-nova-postiz'
            mkdir -p /root/.ssh && chmod 700 /root/.ssh
            touch /root/.ssh/authorized_keys
            if grep -qF "$PUBKEY" /root/.ssh/authorized_keys; then
              echo "MARK_KEY bereits vorhanden"
            else
              echo "$PUBKEY" >> /root/.ssh/authorized_keys
              echo "MARK_KEY hinzugefuegt"
            fi
            chmod 600 /root/.ssh/authorized_keys
            echo "MARK_DONE lines=$(wc -l < /root/.ssh/authorized_keys)"
            ssh-keygen -lf /root/.ssh/authorized_keys 2>&1 | sed 's/^/FP: /' || true
